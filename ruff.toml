target-version = "py314"
line-length = 120

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific rules
]
ignore = [
    "E501",  # line length handled by formatter
]

[lint.per-file-ignores]
"tests/**" = ["B018"]  # allow useless expressions in tests (e.g. assert in set)

[format]
quote-style = "double"
